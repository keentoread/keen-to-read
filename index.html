<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Keen to Read</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@1,300&family=Italianno&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter';
  margin:0;
  height:100vh;
  background:#f5efe6;
  color:#3e2c23;
  font-family:'Inter';
  display:flex;
  justify-content:center;
  align-items:center;
}

.container {
  width:90%;
  max-width:320px;
  text-align:center;
}

.title {
  font-family:'Bebas Neue';
  font-size:48px;
  line-height:1;
}

.sub {
  font-family: 'Italianno', cursive;
  font-size:18px;
  letter-spacing:0.3px;
  margin-bottom:15px;
  opacity:0.7;
}

input, button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:12px;
  border:none;
  box-sizing:border-box;
}

input {
  background:#fff;
}

button {
  border-radius:20px;
  cursor:pointer;
}

.loginBtn {
  background:#6f4e37;
  color:#fff;
}

.signupBtn {
  background:#d6ccc2;
  color:#3e2c23;
}

.status {
  margin-top:10px;
  font-size:12px;
  min-height:20px;
}

.forgot {
  font-size:11px;
  margin-top:10px;
  opacity:0.6;
  cursor:pointer;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  setPersistence,
  browserLocalPersistence,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDPn-v1VGU3k6sOifYIZxR89POfn8Ox6ok",
  authDomain: "keen-to-read.firebaseapp.com",
  projectId: "keen-to-read",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let isSignup = false;

function setStatus(msg){
  document.getElementById("status").innerText = msg;
}

function showError(error){
  let msg = "Something went wrong";

  switch(error.code){
    case "auth/user-not-found":
      msg = "No account found.";
      break;
    case "auth/wrong-password":
      msg = "Wrong password.";
      break;
    case "auth/email-already-in-use":
      msg = "Email already used.";
      break;
  }

  setStatus(msg);
}

// 🔥 SIGNUP
window.signup = async function(){

  const nameInput = document.getElementById("nameInput");
  const confirmInput = document.getElementById("confirmInput");
  const loginBtn = document.getElementById("loginBtn");
  const signupBtn = document.getElementById("signupBtn");
  const forgot = document.getElementById("forgot");

  if(!isSignup){
    isSignup = true;

    nameInput.style.display = "block";
    confirmInput.style.display = "block";

    loginBtn.style.display = "none";
    signupBtn.style.background = "#d6ccc2";
    forgot.style.display = "none";

    setStatus("Create your reading account");
    return;
  }

  const name = nameInput.value.trim();
  const email = emailInput.value.trim();
  const pass = passwordInput.value.trim();
  const confirm = confirmInput.value.trim();

  if(!name){
    return setStatus("Enter your name.");
  }

if(pass.length < 8){
  return setStatus("Password must be at least 8 characters.");
}

  if(pass !== confirm){
    return setStatus("Passwords not match.");
  }

  try{
    await setPersistence(auth, browserLocalPersistence);
    const userCred = await createUserWithEmailAndPassword(auth,email,pass);

    await setDoc(doc(db,"users",userCred.user.uid),{
      name,
      readingGoal:500,
      totalPages:0,
      level:"Beginner"
    });

    window.location.href = "home.html";

  }catch(error){
    showError(error);
  }
};

// 🔥 LOGIN
window.login = async function(){

  const email = emailInput.value.trim();
  const pass = passwordInput.value.trim();

  if(!email || !pass){
    return setStatus("Enter email & password.");
  }

  try{
    await setPersistence(auth, browserLocalPersistence);
    await signInWithEmailAndPassword(auth,email,pass);
    window.location.href = "home.html";
  }catch(error){
    showError(error);
  }
};

// 🔥 RESET
window.resetPassword = async function(){

  const email = emailInput.value.trim();

  if(!email){
    return setStatus("Enter email first.");
  }

  try{
    await sendPasswordResetEmail(auth, email);
    setStatus("Reset email sent 📩");
  }catch(error){
    showError(error);
  }
};
</script>

</head>

<body>

<div class="container">

<div class="title">
  KEEN TO READ
</div>
<div class="sub">
 Book Club
</div>

  <input id="nameInput" placeholder="Name" style="display:none;">
  <input id="emailInput" placeholder="Email">
  <input id="passwordInput" type="password" placeholder="Password">
  <input id="confirmInput" type="password" placeholder="Confirm Password" style="display:none;">

  <button id="loginBtn" class="loginBtn" onclick="login()">Login</button>
  <button id="signupBtn" class="signupBtn" onclick="signup()">Sign Up</button>

  <div id="forgot" class="forgot" onclick="resetPassword()">Forgot password?</div>

  <div id="status" class="status"></div>

</div>

</body>
</html>
