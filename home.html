<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Keen to Read</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=Italianno&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#f5efe6;
  font-family:'Inter';
  color:#3e2c23;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

/* LOGO */
.logo{
  text-align:center;
  margin-bottom:5px;
}
.logo .main{
  font-family:'Bebas Neue';
  font-size:38px;
}
.logo .sub{
  font-family:'Italianno', cursive;
  font-size:20px;
  margin-top:-5px;
  opacity:0.7;
}

/* WELCOME */
.welcome{
  text-align:center;
  margin:10px 0;
}
.welcome .title{
  font-size:10px;
}
.welcome .quote{
  font-size:9px;
  opacity:0.6;
  margin-top:2px;
  margin-bottom:10px;
}

/* BUTTON GROUP */
.group{
  width:100%;
  max-width:280px;
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:14px;
  background:white;
  color:#3e2c23;
  font-size:10px;
  cursor:pointer;
  text-align:center; /* 🔥 กลาง */
  letter-spacing:1px;
  text-transform:uppercase; /* 🔥 พิมใหญ่ */
}

.primary{
  background:#6f4e37;
  color:white;
}

.secondary{
  opacity:0.5;
  background:#8b8a8a;
  color:white;
}

.btn:active{
  background:#eee6dd;
}

/* LOGOUT */
.logout{
  margin-top:10px;
  font-size:12px;
  opacity:0.6;
  cursor:pointer;
}

/* FOOTER */
.footer{
  margin-top:10px;
  font-size:11px;
  opacity:0.5;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.popup-card{
  background:white;
  width:90%;
  max-width:320px;
  padding:18px;
  border-radius:14px;
  text-align:left;
}

.popup-title{
  font-family:'Bebas Neue';
  font-size:20px;
  margin-bottom:10px;
}

.popup-text{
  font-size:12px;
  line-height:1.5;
  opacity:0.7;
}

.popup-btn{
  margin-top:12px;
  padding:10px;
  border-radius:10px;
  background:#6f4e37;
  color:white;
  text-align:center;
  cursor:pointer;
  font-size:10px;
}

.divider{
  width:60px;
  height:1.5px;
  background:#6f4e37;
  margin:6px auto 0;
  opacity:0.3;
  margin-bottom:10px;
}

</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDPn-v1VGU3k6sOifYIZxR89POfn8Ox6ok",
  authDomain: "keen-to-read.firebaseapp.com",
  projectId: "keen-to-read"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const quotes = [
  "A reader lives a thousand lives.",
  "Books are magic you can carry.",
  "Read more, grow more.",
  "One page at a time.",
  "Small reading, big change."
];

onAuthStateChanged(auth, async (user)=>{

  if(!user){
    window.location.href="index.html";
    return;
  }

  const snap = await getDoc(doc(db,"users",user.uid));
  const data = snap.data();

  const name = (data.name || "Reader").toUpperCase();

  document.getElementById("welcome").innerText =
    "WELCOME TO THE CLUB - " + name;

  document.getElementById("quote").innerText =
    quotes[Math.floor(Math.random()*quotes.length)];
});

window.logout = async function(){
  await signOut(auth);
  window.location.href = "index.html";
};

// popup
window.openInstall = ()=>{
  document.getElementById("popup").style.display="flex";
};
window.closePopup = ()=>{
  document.getElementById("popup").style.display="none";
};
</script>

</head>

<body>

<div class="logo">
  <div class="main">KEEN TO READ</div>
  <div class="sub">Book Club</div>
</div>
<div class="divider"></div>
<div class="welcome">
  <div id="welcome" class="title"></div>
  <div id="quote" class="quote"></div>
</div>

<div class="group">

  <button class="btn primary" onclick="window.location.href='tracking.html'">TRACK READING</button>
  <button class="btn" onclick="window.location.href='generate-journey.html'">GENERATE READING JOURNEY</button>
  <button class="btn" onclick="window.location.href='generate-review.html'">GENERATE BOOK REVIEW</button>

  <button class="btn" onclick="window.location.href='profile.html'">YOUR PROFILE</button>
  <button class="btn" onclick="window.location.href='club.html'">YOUR READING JOURNEY</button>
  <button class="btn" onclick="window.location.href='quiz.html'">READING QUIZ</button>
  <button class="btn" onclick="window.location.href='news.html'">EVENT & NEWS</button>

  <button class="btn" onclick="openInstall()">INSTALL APP</button>
  <button class="btn secondary" onclick="window.location.href='contact.html'">CONTACT</button>

</div>

<div class="logout" onclick="logout()">Logout</div>

<div class="footer">
  Keen to Read © 2026
</div>

<!-- POPUP -->
<div id="popup" class="popup" onclick="closePopup()">
  <div class="popup-card" onclick="event.stopPropagation()">

    <div class="popup-title">ADD TO HOME SCREEN</div>

    <div class="popup-text">
      For the best experience, use like an app<br><br>

      <b>iOS (iPhone)</b><br>
      Tap Share → Scroll down → Tap Add to Home Screen<br><br>

      <b>Android</b><br>
      Tap Menu ⋮ (top right) → Tap Add to Home screen
    </div>

    <div class="popup-btn" onclick="closePopup()">OK</div>

  </div>
</div>

</body>
</html>
